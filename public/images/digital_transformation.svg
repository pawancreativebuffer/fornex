<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60C6B1" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />

  <!-- Background decorative glowing elements -->
  <circle cx="150" cy="150" r="100" fill="#60C6B1" opacity="0.1" filter="url(#glow)" />
  <circle cx="650" cy="450" r="150" fill="#3b82f6" opacity="0.1" filter="url(#glow)" />
  
  <!-- Digital grid -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <path d="M 0 100 L 800 100 M 0 200 L 800 200 M 0 300 L 800 300 M 0 400 L 800 400 M 0 500 L 800 500" />
    <path d="M 100 0 L 100 600 M 200 0 L 200 600 M 300 0 L 300 600 M 400 0 L 400 600 M 500 0 L 500 600 M 600 0 L 600 600 M 700 0 L 700 600" />
  </g>

  <!-- Abstract Hospital/Building Structure -->
  <g transform="translate(300, 150)">
    <!-- Main Tower -->
    <rect x="50" y="50" width="100" height="250" rx="10" fill="url(#primaryGradient)" opacity="0.8" />
    <rect x="70" y="80" width="60" height="20" rx="4" fill="#ffffff" opacity="0.9" />
    <rect x="70" y="120" width="60" height="20" rx="4" fill="#ffffff" opacity="0.9" />
    <rect x="70" y="160" width="60" height="20" rx="4" fill="#ffffff" opacity="0.9" />
    <rect x="70" y="200" width="60" height="20" rx="4" fill="#ffffff" opacity="0.9" />
    <rect x="70" y="240" width="60" height="20" rx="4" fill="#ffffff" opacity="0.9" />

    <!-- Left Wing -->
    <rect x="-20" y="150" width="60" height="150" rx="8" fill="#3b82f6" opacity="0.6" />
    <rect x="-5" y="170" width="30" height="15" rx="3" fill="#ffffff" opacity="0.7" />
    <rect x="-5" y="200" width="30" height="15" rx="3" fill="#ffffff" opacity="0.7" />
    <rect x="-5" y="230" width="30" height="15" rx="3" fill="#ffffff" opacity="0.7" />
    <rect x="-5" y="260" width="30" height="15" rx="3" fill="#ffffff" opacity="0.7" />

    <!-- Right Wing -->
    <rect x="160" y="100" width="70" height="200" rx="8" fill="#60C6B1" opacity="0.6" />
    <rect x="180" y="130" width="30" height="15" rx="3" fill="#ffffff" opacity="0.7" />
    <rect x="180" y="160" width="30" height="15" rx="3" fill="#ffffff" opacity="0.7" />
    <rect x="180" y="190" width="30" height="15" rx="3" fill="#ffffff" opacity="0.7" />
    <rect x="180" y="220" width="30" height="15" rx="3" fill="#ffffff" opacity="0.7" />
    <rect x="180" y="250" width="30" height="15" rx="3" fill="#ffffff" opacity="0.7" />

    <!-- Medical Cross -->
    <g transform="translate(80, 20)">
      <rect x="15" y="0" width="10" height="40" fill="#ffffff" />
      <rect x="0" y="15" width="40" height="10" fill="#ffffff" />
    </g>
  </g>

  <!-- Digital Data Streams / UI Elements -->
  <g transform="translate(100, 100)" opacity="0.8">
    <rect x="0" y="0" width="120" height="80" rx="10" fill="#1e293b" stroke="#60C6B1" stroke-width="2" />
    <circle cx="20" cy="20" r="5" fill="#60C6B1" />
    <rect x="35" y="15" width="60" height="10" rx="5" fill="#334155" />
    <rect x="20" y="40" width="80" height="6" rx="3" fill="#334155" />
    <rect x="20" y="55" width="50" height="6" rx="3" fill="#334155" />
  </g>

  <g transform="translate(580, 250)" opacity="0.8">
    <rect x="0" y="0" width="140" height="100" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2" />
    <!-- Pulse Line -->
    <path d="M 10 50 L 40 50 L 50 20 L 70 80 L 80 50 L 130 50" fill="none" stroke="#60C6B1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <g transform="translate(150, 400)" opacity="0.8">
    <rect x="0" y="0" width="160" height="60" rx="10" fill="#1e293b" stroke="#60C6B1" stroke-width="2" />
    <text x="20" y="25" fill="#ffffff" font-family="sans-serif" font-size="12" font-weight="bold">Digital Transformation</text>
    <rect x="20" y="40" width="120" height="8" rx="4" fill="#334155" />
    <rect x="20" y="40" width="59" height="8" rx="4" fill="#60C6B1" /> <!-- 49% Stuck -->
  </g>

  <!-- Connecting Lines -->
  <path d="M 220 140 Q 280 140 330 180" fill="none" stroke="#60C6B1" stroke-width="2" stroke-dasharray="5,5" opacity="0.5" />
  <path d="M 600 300 Q 550 300 500 280" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,5" opacity="0.5" />
  <path d="M 250 400 Q 280 350 310 320" fill="none" stroke="#60C6B1" stroke-width="2" stroke-dasharray="5,5" opacity="0.5" />

  <!-- Floating Particles -->
  <circle cx="450" cy="100" r="3" fill="#ffffff" opacity="0.8" />
  <circle cx="550" cy="150" r="4" fill="#60C6B1" opacity="0.6" />
  <circle cx="300" cy="450" r="5" fill="#3b82f6" opacity="0.7" />
  <circle cx="400" cy="550" r="3" fill="#ffffff" opacity="0.5" />
  <circle cx="200" cy="250" r="6" fill="#60C6B1" opacity="0.4" />
  <circle cx="700" cy="200" r="3" fill="#3b82f6" opacity="0.8" />
</svg>
